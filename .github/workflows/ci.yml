name: CI

# Verifies the Go build and tests — including the RSS feed golden test that
# guards the subscriber-facing feed against unintended changes.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go run ./cmd/build
